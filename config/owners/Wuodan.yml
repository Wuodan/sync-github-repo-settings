owner: Wuodan

ignore_repos: []

dependabot:
  profiles:
    actions-only: ./config/dependabot/actions-only.yml
    npm-actions: ./config/dependabot/npm-actions.yml
    pip-only: ./config/dependabot/pip-only.yml
    pip-actions: ./config/dependabot/pip-actions.yml
    pip-docker-actions: ./config/dependabot/pip-docker-actions.yml
    docker-only: ./config/dependabot/docker-only.yml
    maven-only: ./config/dependabot/maven-only.yml
  repos:
    adfree-dns-pi-cluster:
    cfbaker:
    deterministic-zip:
    docker-vpn-bridge: docker-only
    ebuild-test-suite:
    ensure-immutable-actions-test: npm-actions
    ensure-immutable-actions-test-custom-actions: actions-only
    extract2md: pip-actions
    fastmcp-ollama:
    gentoo-config:
    gentoo-overlay:
    gentoo-raspberrypi-builder:
    helens-playmobil-traum--mit-beispiel-inhalt:
    htmltranslationextract:
    inguma:
    LeosMessenger:
    LeosProject:
    llm-aggregator: pip-actions
    llm-structured-output-demo: actions-only
    local_overlay:
    localrepo:
    local--usr-local-bin:
    mcp-base64: pip-actions
    mcp-gitlock:
    mc-plugin-playground: maven-only
    mindcraft-demo: docker-only
    minecraft-server: docker-only
    ollama_config: docker-only
    pentoo-iso-tester:
    python-repo-template: pip-actions
    routheon: pip-docker-actions
    schreibg:
    sot_autofish: pip-only
    space-invaders:
    SQL-Find-Circular-References:
    sync-github-repo-settings: pip-actions
    tensorflow-quickstart:
    test:
    time-series-prediction: pip-only
    usialtgr:
    usialtgr-no-capslock:
    watchpuppy2: pip-actions
    watchpuppy: pip-docker-actions
    workflow-ready-template:

rules:
  - selector:
      all: true
      fork: false
    settings: {}

  - selector:
      repos:
        - ensure-immutable-actions-test-custom-actions
        - llm-structured-output-demo
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/actions-only.yml

  - selector:
      repos:
        - ensure-immutable-actions-test
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/npm-actions.yml

  - selector:
      repos:
        - sot_autofish
        - time-series-prediction
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/pip-only.yml

  - selector:
      repos:
        - extract2md
        - llm-aggregator
        - mcp-base64
        - python-repo-template
        - watchpuppy2
        - sync-github-repo-settings
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/pip-actions.yml

  - selector:
      repos:
        - routheon
        - watchpuppy
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/pip-docker-actions.yml

  - selector:
      repos:
        - docker-vpn-bridge
        - mindcraft-demo
        - minecraft-server
        - ollama_config
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/docker-only.yml

  - selector:
      repos:
        - mc-plugin-playground
      fork: false
    settings:
      dependabot-yml: ./config/dependabot/maven-only.yml
