name: sync-github-repo-settings

on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only without applying changes
        required: false
        type: boolean
        default: true
      owner:
        description: Optional owner regex filter
        required: false
        type: string
      repo:
        description: Optional repo regex filter (matches repo name and owner/repo)
        required: false
        type: string

jobs:
  discover-owners:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build owner matrix
        id: discover
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          matrix_json="$(./scripts/build-owner-matrix.sh config/owners)"
          echo "Owner matrix:" >&2
          echo "${matrix_json}" >&2
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  sync:
    needs: discover-owners
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-owners.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  #v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ matrix.owner }}

      - name: Build repository list
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ matrix.owner }}
          OWNER_TYPE: ${{ matrix.owner_type }}
          OWNER_CONFIG_FILE: ${{ matrix.owner_config_file }}
          OWNER_FILTER: ${{ inputs.owner }}
          REPO_FILTER: ${{ inputs.repo }}
        run: ./scripts/build-repository-list.sh

      - name: Update repository settings
        uses: joshjohanning/bulk-github-repo-settings-sync-action@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          repositories-file: generated-repos.yml
          code-scanning: true
          secret-scanning: true
          secret-scanning-push-protection: true
          dependabot-alerts: true
          dependabot-security-updates: true
          dependabot-yml: './.github/dependabot.yml'
          dry-run: ${{ github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
