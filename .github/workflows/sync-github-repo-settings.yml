name: sync-github-repo-settings

on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only without applying changes
        required: false
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - owner: Wuodan
            repositories_file: repos/Wuodan.yml
          - owner: aicage
            repositories_file: repos/aicage.yml
          - owner: gh-workflow
            repositories_file: repos/gh-workflow.yml

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  #v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ matrix.owner }}

      - name: Update repository settings
        uses: joshjohanning/bulk-github-repo-settings-sync-action@v2
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          repositories-file: ${{ matrix.repositories_file }}
          code-scanning: true
          secret-scanning: true
          secret-scanning-push-protection: true
          dependabot-alerts: true
          dependabot-security-updates: true
          dependabot-yml: './.github/dependabot.yml'
          dry-run: ${{ github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
