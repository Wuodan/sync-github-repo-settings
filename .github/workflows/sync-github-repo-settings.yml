name: sync-github-repo-settings

"on":
  schedule:
    - cron: '0 5 * * *'
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only without applying changes
        required: false
        type: boolean
        default: false
      owner:
        description: Optional owner regex filter
        required: false
        type: string

jobs:
  discover-owners:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build owner matrix
        id: discover
        run: |
          matrix_json="$(./scripts/build-owner-matrix.sh config/owners '${{ inputs.owner }}')"
          echo "Owner matrix:" >&2
          jq . <<< "${matrix_json}" >&2
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

  sync:
    needs: discover-owners
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-owners.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Detect owner
        id: owner
        run: |
          echo "owner=$(basename '${{ matrix.owner_config_file }}' .yml)" >> "${GITHUB_OUTPUT}"

      - name: Detect owner type
        id: owner-type
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          github_owner_type="$(./scripts/detect-owner-type.sh '${{ steps.owner.outputs.owner }}')"
          echo "GitHub Owner Type: ${github_owner_type}" >&2
          owner_type="$(sed -e 's/^User$/user/' -e 's/^Organization$/org/' <<< "${github_owner_type}")"
          echo "Owner Type: ${owner_type}" >&2
          echo "owner_type=${owner_type}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ steps.owner.outputs.owner }}

      - name: Verify all repos configured for Dependabot
        id: verify-dependabot
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ steps.owner.outputs.owner }}
          OWNER_TYPE: ${{ steps.owner-type.outputs.owner_type }}
          OWNER_CONFIG_FILE: ${{ matrix.owner_config_file }}
        run: ./scripts/check-dependabot-coverage.sh

      - name: Update repository settings
        id: sync-settings
        uses: Wuodan/bulk-github-repo-settings-sync-action@d05fbc5cd8656b9a0b16d122d187df29c581b83a  # Wuodan.main
        # uses: joshjohanning/bulk-github-repo-settings-sync-action@2d0d3516dbfc9030de7ed8531e7da8f85f6a7f0e  # v2.5.1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          repositories-file: ${{ matrix.owner_config_file }}
          immutable-releases: true
          code-scanning: true
          secret-scanning: true
          secret-scanning-push-protection: true
          # private-vulnerability-reporting: true
          dependabot-alerts: true
          dependabot-security-updates: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

      - name: Print sync action outputs
        run: |
          echo "updated-repositories=${{ steps.sync-settings.outputs.updated-repositories }}"
          echo "changed-repositories=${{ steps.sync-settings.outputs.changed-repositories }}"
          echo "unchanged-repositories=${{ steps.sync-settings.outputs.unchanged-repositories }}"
          echo "failed-repositories=${{ steps.sync-settings.outputs.failed-repositories }}"
          echo "warning-repositories=${{ steps.sync-settings.outputs.warning-repositories }}"
          echo "::group::results"
          echo '${{ steps.sync-settings.outputs.results }}' | jq
          echo "::endgroup::"


      - name: Fail on warnings or failures
        id: fail-on-warnings
        continue-on-error: true
        run: |
          failed_repositories='${{ steps.sync-settings.outputs.failed-repositories }}'
          warning_repositories='${{ steps.sync-settings.outputs.warning-repositories }}'

          if (( failed_repositories > 0 || warning_repositories > 0 )); then
            echo "Sync reported warnings or failures for ${{ steps.owner.outputs.owner }}" >&2
            echo "Failed repositories: ${failed_repositories}" >&2
            echo "Warning repositories: ${warning_repositories}" >&2
            exit 1
          fi

      - name: Fail job if any verification step failed
        if: always()
        run: |
          failed=0

          if [[ '${{ steps.verify-dependabot.outcome }}' == 'failure' ]]; then
            echo "'Verify all repos configured for Dependabot' failed for ${{ steps.owner.outputs.owner }}" >&2
            failed=1
          fi

          if [[ '${{ steps.fail-on-warnings.outcome }}' == 'failure' ]]; then
            echo "'Fail on warnings or failures' detected warnings or failures for ${{ steps.owner.outputs.owner }}" >&2
            failed=1
          fi

          if (( failed )); then
            exit 1
          fi
